<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:p="primefaces">
<h:head>
    <meta charset="UTF-8"/>
    <title>Simple Facelet Page</title>
    <h:outputStylesheet library="style" name="index.css"/>
    <h:outputScript library="script" name="clock.js"/>
</h:head>
<h:body>
    <ui:include src="template/header.xhtml"/>

    <main>
        <div class="clock-section">
            <h:form id="clock-form">
                <h:outputText id="date" value="#{dateTime.now}"/>
                <p:clock id="clock" widgetVar="clockVar" displayMode="analog" mode="server" value="#{dateTime.now}"
                         widgetPostRefresh="stopClock()"/>
                <p:remoteCommand name="updateClock" update="date clock"/>
            </h:form>
        </div>


        <h:form id="redirect-form">
            <h:commandButton value="Area" action="toAreaPage"/>
        </h:form>

    </main>

    <ui:include src="template/footer.xhtml"/>
</h:body>
</html>
