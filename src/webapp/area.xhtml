<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:p="primefaces">
<h:head>
    <meta charset="UTF-8"/>
    <title>Simple Facelet Page</title>
</h:head>
<h:body style="background: #222222">
    <ui:include src="template/header.xhtml"/>

    <main>
        <div class="graph-container">
            <h:graphicImage id="graph-image" value="" style="width:600px;height:600px;"> <!-- TODO: remove style -->

            </h:graphicImage>

        </div>

        <h:form>
            <h:outputLabel for="x" value="X:"/>
            <h:inputText id="x" required="true"/>
            <br/>
            <h:outputLabel for="y" value="Y:"/>
            <h:inputText id="y" required="true"/>
            <br/>
            <h:outputLabel for="r" value="R:"/>
            <p:selectOneRadio id="r" name="oneRadioR" value="#{area.r}" required="true">
                <f:selectItem itemLabel="1" itemValue="1"/>
                <f:selectItem itemLabel="2" itemValue="2"/>
                <f:selectItem itemLabel="3" itemValue="3"/>
                <f:selectItem itemLabel="4" itemValue="4"/>
                <f:selectItem itemLabel="5" itemValue="5"/>
                <p:ajax event="change" oncomplete="drawGraph()"/>
            </p:selectOneRadio>
        </h:form>


        <h:form>
            <h:commandButton value="Main" action="toMainPage"/>
        </h:form>
    </main>

    <ui:include src="template/footer.xhtml"/>

    <h:outputScript library="script" name="graph.js"/>
</h:body>
</html>
